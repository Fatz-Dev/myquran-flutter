name: myquran
description: "Aplikasi MyQuran - Al-Quran, Doa, dan Jadwal Shalat."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  shared_preferences: ^2.3.4
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  just_audio: ^0.9.43
  audio_session: ^0.1.21
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  just_audio_background: ^0.0.1-beta.17
  table_calendar: ^3.1.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  url_launcher: ^6.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - icon-quran.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon-quran.png"
